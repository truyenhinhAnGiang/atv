<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Liên Hệ Cơ Quan</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            overflow: hidden; 
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* Khung hiển thị ảnh */
        .header-image {
            width: 100%;
            /* height: 180px; */
            height: auto;           /* Thay 180px bằng auto */
            aspect-ratio: 2048 / 339;
            background-image: url('coquan.jpg'); 
            /* background-size: cover;  */
            background-size: contain;      /* Thay 'cover' bằng 'contain' */
            background-repeat: no-repeat;  /* Thêm dòng này để ảnh không bị lặp lại */
            background-position: center;
            border-bottom: 2px solid #007bff;
            background-color: ##ffffff; 
        }

        .content { padding: 25px; }

        h1 { color: #2c3e50; font-size: 19px; margin: 15px 0 5px 0; font-weight: bold; line-height: 1.4; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }

        .link-btn { 
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            background: #ffffff; 
            color: #333; 
            text-decoration: none; 
            padding: 15px 20px; 
            margin: 12px 0; 
            border-radius: 12px; 
            font-weight: 600; 
            border: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .link-btn i { font-size: 18px; width: 35px; text-align: left; }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: white !important;
       
        }

        /* Hiệu ứng khi chạm ngón tay vào (Dành cho điện thoại) */
        .link-btn:active {
            transform: scale(0.95); /* Nút thu nhỏ lại một chút như bị nhấn thật */
            transition: 0.1s;       /* Phản hồi cực nhanh */
        }
        
        /* Các class bổ sung để đổi màu nền khi hover */
        /* .web:hover { background: #007bff; border-color: #007bff; }
        .facebook:hover { background: #1877f2; border-color: #1877f2; }
        .youtube:hover { background: #ff0000; border-color: #ff0000; } */

        /* Khi di chuột HOẶC khi chạm tay vào */
        .web:hover, .web:active { background: #007bff; border-color: #007bff; color: white !important; }
        
        .facebook:hover, .facebook:active { background: #1877f2; border-color: #1877f2; color: white !important; }
        
        .youtube:hover, .youtube:active { background: #ff0000; border-color: #ff0000; color: white !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer { font-size: 11px; color: #bdc3c7; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-image"></div>

        <div class="content">
            <h1>Báo và Phát thanh - Truyền hình An Giang</h1>
            <p>Cổng thông tin điện tử chính thức</p>

            <a href="https://angiangtv.vn" class="link-btn web">
                <i class="fas fa-globe" style="color: #007bff;"></i> Website Chính Thức
            </a>
            
            <a href="https://facebook.com/truyenhinhangiang" class="link-btn facebook">
                <i class="fa-brands fa-facebook" style="color: #1877f2;"></i>Facebook Truyền hình An Giang
            </a>

            <a href="https://www.facebook.com/angiang24gio" class="link-btn facebook">
                <i class="fa-brands fa-facebook" style="color: #1877f2;"></i> Fanpage An Giang 24H
            </a>

            <a href="https://www.youtube.com/@ATVT%E1%BB%95ngH%E1%BB%A3pAG" class="link-btn youtube">
                <i class="fa-brands fa-youtube" style="color: #ff0000;"></i> Kênh Youtube Tổng hợp
            </a>

            <a href="https://www.youtube.com/@angiang24gio" class="link-btn youtube">
                <i class="fa-brands fa-youtube" style="color: #ff0000;"></i> Kênh Youtube 24H
            </a>
        </div>
        <!-- <div class="footer">Đài PT-TH An Giang</div>
        <div class="footer">©Copyright by Kỹ Thuật Công Nghệ</div> -->
        <div class="footer">
            Báo và PT-TH An Giang <br> 
            ©Copyright by Kỹ Thuật Công Nghệ
        </div>
    </div>
</body>
</html>
